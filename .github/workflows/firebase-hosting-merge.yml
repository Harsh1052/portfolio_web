name: deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: install dependencies
        run: flutter pub get

      - name: analyze
        run: flutter analyze

      - name: build web
        run: |
          flutter build web \
            --release \
            --pwa-strategy offline-first \
            --no-tree-shake-icons \
            --source-maps

      - name: deploy to firebase hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HARSH_PORTFOLIO_WEB }}
          channelId: live
          projectId: harsh-portfolio-web
