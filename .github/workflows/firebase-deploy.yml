name: deploy

on:
  push:
    branches:
      - master

  # allow triggering manually from the Actions tab
  workflow_dispatch:

concurrency:
  # cancel any in-progress deploy if a newer push lands on master
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      # cache pub packages across runs — shaves ~30s off warm builds
      - name: cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: install dependencies
        run: flutter pub get

      # ── Quality gates ────────────────────────────────────────────────────────
      - name: analyze
        run: flutter analyze

      # ── Build ────────────────────────────────────────────────────────────────
      - name: build web
        run: |
          flutter build web \
            --release \
            --pwa-strategy offline-first \
            --no-tree-shake-icons \
            --source-maps

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: deploy to firebase hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: harsh-portfolio-web
