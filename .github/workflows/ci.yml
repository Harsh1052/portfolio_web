name: ci

on:
  pull_request:
    branches:
      - master

  # also run on pushes to feature branches so you catch issues early
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: install dependencies
        run: flutter pub get

      - name: check formatting
        run: dart format --set-exit-if-changed .
        continue-on-error: true

      - name: analyze
        run: flutter analyze

      - name: run tests
        run: flutter test || echo "no tests yet"
        continue-on-error: true

      - name: build web (sanity check)
        run: |
          flutter build web \
            --release \
            --no-tree-shake-icons

      - name: build size report
        run: |
          echo "build/web size:"
          du -sh build/web
          echo ""
          du -h build/web/* | sort -rh | head -15
