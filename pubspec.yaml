name: portfolio_web
description: Harsh Sureja — Flutter Developer Portfolio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Fonts
  google_fonts: ^6.3.0

  # State management & routing
  get: ^4.6.6

  # Firebase — lazy-initialized, not called in main()
  firebase_core: ^3.7.0
  cloud_firestore: ^5.5.0

  # Utilities
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.10+1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/config/
    - assets/data/
    - assets/images/
    - assets/icons/
